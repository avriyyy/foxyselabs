<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <!-- Navbar -->
  <rect x="0" y="0" width="800" height="60" fill="#fff" rx="0"/>
  <rect x="24" y="16" width="120" height="28" rx="6" fill="#db2777" opacity="0.15"/>
  <rect x="650" y="18" width="60" height="24" rx="6" fill="#db2777" opacity="0.2"/>
  <rect x="730" y="18" width="50" height="24" rx="6" fill="#db2777" opacity="0.15"/>
  <!-- Hero banner -->
  <rect x="0" y="60" width="800" height="200" fill="#db2777" opacity="0.08"/>
  <rect x="80" y="100" width="640" height="16" rx="4" fill="#1a1a2e" opacity="0.1"/>
  <rect x="150" y="130" width="500" height="12" rx="4" fill="#1a1a2e" opacity="0.07"/>
  <rect x="250" y="160" width="300" height="40" rx="8" fill="#db2777" opacity="0.2"/>
  <!-- Product grid -->
  <rect x="40" y="300" width="220" height="260" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="60" y="320" width="180" height="140" rx="8" fill="#db2777" opacity="0.06"/>
  <rect x="60" y="475" width="160" height="8" rx="4" fill="#1a1a2e" opacity="0.1"/>
  <rect x="60" y="495" width="100" height="8" rx="4" fill="#1a1a2e" opacity="0.07"/>
  <rect x="60" y="515" width="80" height="28" rx="6" fill="#db2777" opacity="0.2"/>

  <rect x="290" y="300" width="220" height="260" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="310" y="320" width="180" height="140" rx="8" fill="#db2777" opacity="0.06"/>
  <rect x="310" y="475" width="160" height="8" rx="4" fill="#1a1a2e" opacity="0.1"/>
  <rect x="310" y="495" width="100" height="8" rx="4" fill="#1a1a2e" opacity="0.07"/>
  <rect x="310" y="515" width="80" height="28" rx="6" fill="#db2777" opacity="0.2"/>

  <rect x="540" y="300" width="220" height="260" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="560" y="320" width="180" height="140" rx="8" fill="#db2777" opacity="0.06"/>
  <rect x="560" y="475" width="160" height="8" rx="4" fill="#1a1a2e" opacity="0.1"/>
  <rect x="560" y="495" width="100" height="8" rx="4" fill="#1a1a2e" opacity="0.07"/>
  <rect x="560" y="515" width="80" height="28" rx="6" fill="#db2777" opacity="0.2"/>
  <!-- Footer -->
  <rect x="0" y="540" width="800" height="60" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="200" text-anchor="middle" fill="#db2777" font-size="32" font-family="system-ui" opacity="0.3">E-Commerce Preview</text>
</svg>
