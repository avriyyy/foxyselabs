name: foxyselabs

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: foxyselabs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foxyse}
      POSTGRES_USER: ${POSTGRES_USER:-foxyse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./apps/gateway/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foxyse} -d ${POSTGRES_DB:-foxyse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foxynet

  redis:
    image: redis:7-alpine
    container_name: foxyselabs-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - foxynet

  gateway:
    build:
      context: ./apps/gateway
      dockerfile: Dockerfile
    container_name: foxyselabs-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-foxyse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-foxyse}
      REDIS_URL: redis://redis:6379/0
      GATEWAY_PORT: 8080
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      AGENT_SERVICE_URL: http://agent:8000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      ACCESS_TOKEN_TTL: 24
      REFRESH_TOKEN_TTL: 30
      GIN_MODE: release
    networks:
      - foxynet
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    expose:
      - "8080"

  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    container_name: foxyselabs-agent
    restart: unless-stopped
    environment:
      FOX_AGENT_PORT: 8000
      FOX_LOG_LEVEL: info
      FOX_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FOX_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FOX_OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      FOX_MIMO_API_KEY: ${MIMO_API_KEY:-}
      FOX_MIMO_BASE_URL: ${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      FOX_DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-openai}
      FOX_DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-4o-mini}
    networks:
      - foxynet
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: foxyselabs-web
    restart: unless-stopped
    depends_on:
      - gateway
    environment:
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8080}
      NODE_ENV: production
    ports:
      - "${PUBLIC_PORT:-3000}:3000"
    networks:
      - foxynet

networks:
  foxynet:
    driver: bridge
