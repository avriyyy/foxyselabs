name: foxyselabs

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: foxyselabs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foxyse}
      POSTGRES_USER: ${POSTGRES_USER:-foxyse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./apps/gateway/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foxyse} -d ${POSTGRES_DB:-foxyse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foxynet

  redis:
    image: redis:7-alpine
    container_name: foxyselabs-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - foxynet

  # Placeholders for Sprint 1+ (uncomment as services are built)
  # gateway:
  #   build: ./apps/gateway
  #   ...

  # agent:
  #   build: ./apps/agent
  #   ...

  # web:
  #   build: ./apps/web
  #   ...

networks:
  foxynet:
    driver: bridge
