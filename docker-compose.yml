name: foxyselabs

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: foxyselabs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foxyse}
      POSTGRES_USER: ${POSTGRES_USER:-foxyse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./apps/gateway/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foxyse} -d ${POSTGRES_DB:-foxyse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foxynet

  redis:
    image: redis:7-alpine
    container_name: foxyselabs-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - foxynet

  gateway:
    build:
      context: ./apps/gateway
      dockerfile: Dockerfile
    container_name: foxyselabs-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-foxyse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-foxyse}
      REDIS_URL: redis://redis:6379/0
      FOX_GATEWAY_PORT: 8080
      FOX_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      FOX_AGENT_SERVICE_URL: http://agent:8000
      FOX_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      FOX_ADMIN_NAME: ${ADMIN_NAME:-Admin}
      FOX_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme-on-first-login-please}
    networks:
      - foxynet
    ports:
      - "${GATEWAY_PORT:-8080}:8080"

  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    container_name: foxyselabs-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FOX_AGENT_PORT: 8000
      FOX_LOG_LEVEL: info
      FOX_CLAUDE_MODEL: ${CLAUDE_MODEL:-mimo-v2-flash}
      FOX_WORKSPACE_ROOT: /data/workspaces
      FOX_WORKSPACE_HOST_ROOT: ${WORKSPACE_HOST_ROOT:-/data/workspaces}
      FOX_SANDBOX_IMAGE: ${SANDBOX_IMAGE:-foxyselabs-sandbox:latest}
      FOX_SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
      FOX_SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-512m}
      FOX_SANDBOX_CPU_LIMIT: ${SANDBOX_CPU_LIMIT:-1.0}
      FOX_SANDBOX_IDLE_TIMEOUT_SEC: ${SANDBOX_IDLE_TIMEOUT_SEC:-600}
      # Passed to the `claude` subprocess (and forwarded to sandbox) as ANTHROPIC_* env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.xiaomimimo.com/anthropic}
    volumes:
      # Workspace data — shared with the host for self-host data persistence
      - ./data/workspaces:/data/workspaces
      # Docker socket — required to spawn per-thread sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - foxynet
    expose:
      - "8000"

  # Sandbox base image: built by docker compose so the agent can spawn
  # per-thread instances of this image. Runs a no-op container so the
  # image is included in `docker compose up`.
  sandbox:
    image: foxyselabs-sandbox:latest
    container_name: foxyselabs-sandbox-builder
    build:
      context: ./apps/agent
      dockerfile: sandbox.Dockerfile
    networks:
      - foxynet
    command: ["sleep", "infinity"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: foxyselabs-web
    restart: unless-stopped
    depends_on:
      - gateway
    environment:
      INTERNAL_GATEWAY_URL: http://gateway:8080
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8080}
      NODE_ENV: production
    ports:
      - "${PUBLIC_PORT:-3000}:3000"
    networks:
      - foxynet

networks:
  foxynet:
    driver: bridge
